version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: wordpress_db
    restart: always
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_network

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    container_name: wordpress_app
    restart: always
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
    networks:
      - wp_network

  wp-cli:
    depends_on:
      - db
      - wordpress
    image: wordpress:cli
    container_name: wordpress_cli
    user: "33:33" # Running as normal user, or we can omit it if permission issues don't occur. On Windows, host permission mapping is transparent.
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    networks:
      - wp_network

volumes:
  db_data:

networks:
  wp_network:
    driver: bridge
